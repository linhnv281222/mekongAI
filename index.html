<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mechanical AI — Đọc bản vẽ</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #181b24;
    --surface2: #1e2130;
    --border: #2a2f42;
    --border2: #363c54;
    --text: #e2e6f0;
    --text2: #8892aa;
    --text3: #555e78;
    --accent: #4f8ef7;
    --accent2: #3a6fd4;
    --green: #34c77b;
    --amber: #f5a623;
    --red: #e8445a;
    --teal: #2ec4b6;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  body { font-family: var(--sans); background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

  .layout { display: grid; grid-template-columns: 320px 1fr; height: 100vh; }

  /* ── LEFT PANEL ── */
  .left { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }

  .left-header { padding: 20px 18px 14px; border-bottom: 1px solid var(--border); }
  .logo { font-family: var(--mono); font-size: 11px; font-weight: 500; color: var(--accent); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 4px; }
  .logo-sub { font-size: 12px; color: var(--text3); }

  .drop-zone { margin: 14px; border: 1.5px dashed var(--border2); border-radius: 10px; padding: 22px 16px; text-align: center; cursor: pointer; transition: all .2s; position: relative; }
  .drop-zone:hover, .drop-zone.drag { border-color: var(--accent); background: rgba(79,142,247,.06); }
  .drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .drop-icon { font-size: 28px; margin-bottom: 8px; display: block; }
  .drop-text { font-size: 12px; color: var(--text2); line-height: 1.5; }
  .drop-text strong { color: var(--text); display: block; font-size: 13px; margin-bottom: 3px; }

  .uploading { margin: 0 14px 10px; background: rgba(79,142,247,.1); border: 1px solid rgba(79,142,247,.3); border-radius: 8px; padding: 10px 14px; font-size: 12px; color: var(--accent); display: flex; align-items: center; gap: 8px; }
  .spin { animation: spin .8s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .list-header { padding: 10px 18px 6px; font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: .1em; text-transform: uppercase; }
  .drawing-list { flex: 1; overflow-y: auto; padding: 0 10px 10px; }
  .drawing-list::-webkit-scrollbar { width: 4px; }
  .drawing-list::-webkit-scrollbar-track { background: transparent; }
  .drawing-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  .drawing-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 3px; border: 1px solid transparent; transition: all .15s; }
  .drawing-item:hover { background: var(--surface2); border-color: var(--border); }
  .drawing-item.active { background: rgba(79,142,247,.12); border-color: rgba(79,142,247,.35); }
  .drawing-item-top { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
  .drawing-code { font-family: var(--mono); font-size: 11px; font-weight: 500; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .badge { font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: .05em; flex-shrink: 0; }
  .badge-pending { background: rgba(245,166,35,.15); color: var(--amber); }
  .badge-reviewed { background: rgba(79,142,247,.15); color: var(--accent); }
  .badge-approved { background: rgba(52,199,123,.15); color: var(--green); }
  .drawing-name { font-size: 11px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ── RIGHT PANEL ── */
  .right { display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }

  .right-header { padding: 18px 24px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; flex-shrink: 0; }
  .drawing-title { font-size: 18px; font-weight: 600; color: var(--text); font-family: var(--mono); }
  .drawing-title-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .approve-btn { padding: 7px 16px; background: rgba(52,199,123,.15); border: 1px solid rgba(52,199,123,.4); border-radius: 7px; color: var(--green); font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; white-space: nowrap; }
  .approve-btn:hover { background: rgba(52,199,123,.25); }

  .right-body { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
  .right-body::-webkit-scrollbar { width: 4px; }
  .right-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  /* ── EMPTY STATE ── */
  .empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--text3); }
  .empty-icon { font-size: 48px; opacity: .4; }
  .empty p { font-size: 14px; }

  /* ── CARDS ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .card-header { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .card-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot-blue { background: var(--accent); }
  .dot-green { background: var(--green); }
  .dot-amber { background: var(--amber); }
  .dot-teal { background: var(--teal); }
  .dot-red { background: var(--red); }
  .dot-purple { background: var(--purple); }
  .card-title { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .09em; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0; }
  .kv { padding: 12px 16px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .kv:nth-child(2n) { border-right: none; }
  .kv-l { font-size: 10px; color: var(--text3); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .07em; }
  .kv-v { font-size: 13px; color: var(--text); font-weight: 500; }
  .kv-v.mono { font-family: var(--mono); font-size: 12px; }
  .kv-v.accent { color: var(--accent); }
  .kv-v.green { color: var(--green); }
  .kv-v.amber { color: var(--amber); }

  .step-list { padding: 4px 0; }
  .step-row { display: flex; align-items: flex-start; gap: 12px; padding: 10px 16px; border-bottom: 1px solid var(--border); }
  .step-row:last-child { border-bottom: none; }
  .step-num { width: 22px; height: 22px; border-radius: 50%; background: rgba(79,142,247,.15); border: 1px solid rgba(79,142,247,.3); color: var(--accent); font-size: 10px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; font-family: var(--mono); }
  .step-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .step-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }

  .lo-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .lo-table th { padding: 8px 14px; text-align: left; font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; border-bottom: 1px solid var(--border); }
  .lo-table td { padding: 9px 14px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: top; line-height: 1.4; }
  .lo-table tr:last-child td { border-bottom: none; }
  .lo-table tr:hover td { background: rgba(255,255,255,.02); }
  .lo-table .critical td { background: rgba(245,166,35,.05); }
  .lo-table .critical td:first-child { border-left: 2px solid var(--amber); }
  .tag { display: inline-block; font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 4px; font-family: var(--mono); }
  .tag-ren { background: rgba(79,142,247,.15); color: var(--accent); }
  .tag-tron { background: rgba(46,196,182,.15); color: var(--teal); }
  .tag-csk { background: rgba(245,166,35,.15); color: var(--amber); }
  .tag-other { background: rgba(136,146,170,.12); color: var(--text2); }

  .flow-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; padding: 14px 16px; }
  .flow-item { background: var(--surface2); border: 1px solid var(--border2); border-radius: 7px; padding: 6px 12px; font-size: 12px; font-weight: 500; color: var(--text); }
  .flow-arrow { color: var(--text3); font-size: 16px; }

  /* ── TOKENS ── */
  .token-bar { display: flex; gap: 16px; padding: 8px 16px; background: rgba(79,142,247,.05); border-top: 1px solid var(--border); font-size: 11px; color: var(--text3); font-family: var(--mono); flex-wrap: wrap; }
  .token-item strong { color: var(--accent); }
  .token-cache { color: var(--green); }

  /* ── CHAT ── */
  .chat-panel { flex-shrink: 0; border-top: 1px solid var(--border); background: var(--surface); }
  .chat-messages { max-height: 180px; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
  .chat-messages::-webkit-scrollbar { width: 3px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border2); }
  .chat-msg { max-width: 85%; }
  .chat-msg.user { align-self: flex-end; }
  .chat-msg.ai { align-self: flex-start; }
  .chat-bubble { padding: 8px 12px; border-radius: 8px; font-size: 12px; line-height: 1.5; }
  .chat-msg.user .chat-bubble { background: rgba(79,142,247,.2); border: 1px solid rgba(79,142,247,.3); color: var(--text); }
  .chat-msg.ai .chat-bubble { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); }
  .chat-msg.ai.thinking .chat-bubble { color: var(--text3); font-style: italic; }
  .chat-input-row { display: flex; gap: 8px; padding: 10px 14px 14px; align-items: center; }
  .chat-hint { font-size: 10px; color: var(--text3); padding: 0 16px 6px; }
  .chat-input { flex: 1; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 9px 13px; color: var(--text); font-size: 13px; font-family: var(--sans); outline: none; transition: border-color .15s; }
  .chat-input:focus { border-color: var(--accent); }
  .chat-input::placeholder { color: var(--text3); }
  .chat-send { padding: 9px 16px; background: var(--accent); border: none; border-radius: 8px; color: #fff; font-size: 12px; font-weight: 500; cursor: pointer; transition: background .15s; white-space: nowrap; font-family: var(--sans); }
  .chat-send:hover { background: var(--accent2); }
  .chat-send:disabled { opacity: .5; cursor: not-allowed; }

  /* ── PHÂN TÍCH ĐỘ PHỨC TẠP ── */
  .pt-nc-row { display: flex; flex-wrap: wrap; gap: 6px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .pt-nc-chip { display: flex; align-items: center; gap: 5px; padding: 4px 10px; border: 1px solid var(--border2); border-radius: 6px; font-size: 11px; font-weight: 500; color: var(--text2); }
  .pt-nc-chip.active { background: rgba(79,142,247,.15); border-color: rgba(79,142,247,.4); color: var(--accent); }
  .pt-nc-chip .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .pt-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .pt-table th { padding: 7px 14px; font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; border-bottom: 1px solid var(--border); text-align: left; background: var(--surface2); }
  .pt-table td { padding: 9px 14px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
  .pt-table tr:last-child td { border-bottom: none; }
  .pt-table .cat { color: var(--text3); font-size: 11px; }
  .pt-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
  .pt-badge-1 { background: rgba(52,199,123,.15); color: var(--green); }
  .pt-badge-2 { background: rgba(46,196,182,.15); color: var(--teal); }
  .pt-badge-3 { background: rgba(245,166,35,.15); color: var(--amber); }
  .pt-badge-4 { background: rgba(232,68,90,.1); color: var(--red); }
  .pt-badge-5 { background: rgba(232,68,90,.2); color: var(--red); }
  .pt-idx { font-family: var(--mono); font-size: 11px; color: var(--text3); margin-left: 6px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

const API = "";

function tagClass(loai) {
  if (!loai) return "tag tag-other";
  const l = loai.toLowerCase();
  if (l.includes("ren")) return "tag tag-ren";
  if (l.includes("tr") && l.includes("n")) return "tag tag-tron";
  if (l.includes("csk") || l.includes("cham")) return "tag tag-csk";
  return "tag tag-other";
}

function TokenBar({ usage }) {
  if (!usage) return null;
  return (
    <div className="token-bar">
      <span>input <strong>{usage.input_tokens}</strong></span>
      {usage.cache_write_tokens > 0 && <span>cache_write <strong>{usage.cache_write_tokens}</strong></span>}
      {usage.cache_read_tokens > 0 && <span className="token-cache">cache_hit <strong>{usage.cache_read_tokens}</strong> ({usage.cache_hit_ratio_pct}%)</span>}
      <span>output <strong>{usage.output_tokens}</strong></span>
    </div>
  );
}


function ptBadgeClass(idx) {
  return `pt-badge pt-badge-${Math.min(5, Math.max(1, idx || 3))}`;
}

function PhanTichCard({ data }) {
  if (!data) return null;
  const pt = data.phan_tich_do_phuc_tap;
  if (!pt) return null;
  const nc = pt.nc_dac_biet || {};
  const bp = pt.bang_phan_tich || {};
  const NC_LIST = ['WC','GF','LF','HAN','CAYREN','DONGPIN','TOOL'];
  const rows = [
    ['Kích thước', bp.kich_thuoc],
    ['Khối lượng', bp.khoi_luong],
    ['Loại vật liệu', bp.vat_lieu],
    ['Nguyên công hàn', bp.nguyen_cong_han],
    ['Độ khó dung sai', bp.do_kho_dung_sai],
    ['Hình dạng', bp.hinh_dang],
  ];
  return (
    <div className="card">
      <div className="card-header"><div className="card-dot dot-purple"/><span className="card-title">9 — Phân tích độ phức tạp</span></div>
      <div className="pt-nc-row">
        {NC_LIST.map(n => (
          <div key={n} className={`pt-nc-chip${nc[n] ? ' active' : ''}`}>
            <span className="dot"/>
            {n}
          </div>
        ))}
      </div>
      <table className="pt-table">
        <thead>
          <tr><th>Danh mục</th><th>Loại</th><th>Index</th></tr>
        </thead>
        <tbody>
          {rows.map(([cat, val]) => val ? (
            <tr key={cat}>
              <td className="cat">{cat}</td>
              <td><span className={ptBadgeClass(val.idx)}>{val.loai}</span></td>
              <td><span className="pt-idx">{val.idx}</span></td>
            </tr>
          ) : null)}
        </tbody>
      </table>
    </div>
  );
}

function ResultPanel({ drawing, onApprove, onCorrection }) {
  const d = drawing.full_data || drawing.data;
  if (!d) return null;

  return (
    <>
      {/* 1. Khung tên */}
      <div className="card">
        <div className="card-header"><div className="card-dot dot-blue"/><span className="card-title">1 — Khung tên</span></div>
        <div className="grid-2">
          <div className="kv"><div className="kv-l">Mã bản vẽ</div><div className="kv-v mono accent">{d.ban_ve?.ma_ban_ve ?? "—"}</div></div>
          <div className="kv"><div className="kv-l">Revision</div><div className="kv-v mono">{d.ban_ve?.revision ?? "—"}</div></div>
          <div className="kv"><div className="kv-l">Tên chi tiết</div><div className="kv-v">{d.ban_ve?.ten_chi_tiet ?? "—"}</div></div>
          <div className="kv"><div className="kv-l">Số lượng</div><div className="kv-v green">{d.san_xuat?.so_luong ?? "—"} cái</div></div>
          <div className="kv"><div className="kv-l">Nguyên vật liệu</div><div className="kv-v mono">{d.vat_lieu?.ma ?? "—"}</div></div>
          <div className="kv"><div className="kv-l">Loại</div><div className="kv-v">{d.vat_lieu?.loai ?? "—"}</div></div>
          <div className="kv"><div className="kv-l">Xử lý nhiệt</div><div className="kv-v">{d.vat_lieu?.nhiet_luyen ?? "Không"}</div></div>
          <div className="kv"><div className="kv-l">Tiêu chuẩn</div><div className="kv-v">{d.san_xuat?.tieu_chuan ?? "—"}</div></div>
        </div>
        {d.xu_ly?.be_mat?.length > 0 && (
          <div style={{padding:"12px 16px 14px",borderTop:"1px solid var(--border)"}}>
            <div className="kv-l" style={{marginBottom:8}}>Xử lý bề mặt</div>
            {d.xu_ly.be_mat.map((x, i) => (
              <div key={i} style={{display:"flex",gap:10,marginBottom:6,alignItems:"flex-start"}}>
                <span style={{background:"rgba(46,196,182,.15)",color:"var(--teal)",fontSize:10,fontWeight:600,padding:"2px 7px",borderRadius:4,flexShrink:0}}>B{x.buoc}</span>
                <div>
                  <div style={{fontSize:13,color:"var(--text)"}}>{x.ten}</div>
                  {x.tieu_chuan && <div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>{x.tieu_chuan}</div>}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* 2. Hình dạng */}
      <div className="card">
        <div className="card-header"><div className="card-dot dot-teal"/><span className="card-title">2 — Hình dạng & gia công</span></div>
        <div className="grid-2">
          <div className="kv"><div className="kv-l">Loại</div><div className="kv-v">{d.hinh_dang?.loai ?? "—"}</div></div>
          <div className="kv"><div className="kv-l">Phương án</div><div className="kv-v accent">{d.hinh_dang?.phuong_an_gia_cong ?? "—"}</div></div>
        </div>
        {d.hinh_dang?.mo_ta?.length > 0 && (
          <div style={{padding:"8px 16px 12px",borderTop:"1px solid var(--border)"}}>
            {d.hinh_dang.mo_ta.map((m, i) => (
              <div key={i} style={{fontSize:12,color:"var(--text2)",padding:"3px 0",display:"flex",gap:8}}>
                <span style={{color:"var(--text3)"}}>—</span>{m}
              </div>
            ))}
          </div>
        )}
      </div>

      {/* 3. Kích thước bao */}
      <div className="card">
        <div className="card-header"><div className="card-dot dot-amber"/><span className="card-title">3 — Kích thước bao</span></div>
        <div className="grid-3">
          {[["Dài (L)", d.kich_thuoc_bao?.dai], ["Rộng (W)", d.kich_thuoc_bao?.rong], ["Cao / Ø", d.kich_thuoc_bao?.cao_hoac_duong_kinh]].map(([label, val]) => (
            <div className="kv" key={label} style={{borderRight:"1px solid var(--border)"}}>
              <div className="kv-l">{label}</div>
              <div className="kv-v mono" style={{fontSize:15}}>{val ?? "—"}<span style={{fontSize:10,color:"var(--text3)",marginLeft:3}}>{d.kich_thuoc_bao?.don_vi}</span></div>
            </div>
          ))}
        </div>
        <div style={{padding:"8px 16px 10px",borderTop:"1px solid var(--border)",display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:11,color:"var(--text3)"}}>Phân loại:</span>
          <span style={{fontSize:12,fontWeight:500,color:"var(--amber)"}}>{d.kich_thuoc_bao?.phan_loai_do_lon ?? "—"}</span>
        </div>
      </div>

      {/* 4. Nguyên công CNC */}
      {d.nguyen_cong_cnc?.length > 0 && (
        <div className="card">
          <div className="card-header"><div className="card-dot dot-blue"/><span className="card-title">4 — Nguyên công CNC</span></div>
          <div className="step-list">
            {d.nguyen_cong_cnc.map((nc) => (
              <div className="step-row" key={nc.stt}>
                <div className="step-num">{nc.stt}</div>
                <div>
                  <div className="step-name">{nc.ten}</div>
                  <div className="step-meta">{nc.may}{nc.ghi_chu ? ` · ${nc.ghi_chu}` : ""}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* 5. Bề mặt & lỗ */}
      {d.be_mat_gia_cong?.length > 0 && (
        <div className="card">
          <div className="card-header"><div className="card-dot dot-red"/><span className="card-title">5 — Bề mặt & lỗ gia công</span></div>
          <table className="lo-table">
            <thead>
              <tr><th>Bề mặt</th><th>Loại</th><th>Quy cách</th><th>Kích thước / DT</th><th>Ghi chú</th></tr>
            </thead>
            <tbody>
              {d.be_mat_gia_cong.map((b, i) => (
                <tr key={i} className={b.critical ? "critical" : ""}>
                  <td style={{fontFamily:"var(--mono)",fontSize:11}}>{b.be_mat}</td>
                  <td><span className={tagClass(b.loai)}>{b.loai ?? "—"}</span></td>
                  <td style={{fontFamily:"var(--mono)",fontSize:11,color:"var(--accent)"}}>{b.quy_cach ?? "—"}</td>
                  <td style={{fontFamily:"var(--mono)",fontSize:11}}>{b.sau_hoac_kich_thuoc ?? "—"}{b.dung_sai ? <span style={{color:"var(--amber)",marginLeft:4}}>{b.dung_sai}</span> : null}</td>
                  <td style={{color:"var(--text3)"}}>{b.ghi_chu ?? ""}{b.critical ? <span style={{color:"var(--amber)",marginLeft:4,fontWeight:600}}>⚑ CRITICAL</span> : null}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {/* Quy trình tổng thể */}
      {d.quy_trinh_tong_the?.length > 0 && (
        <div className="card">
          <div className="card-header"><div className="card-dot dot-green"/><span className="card-title">Quy trình tổng thể</span></div>
          <div className="flow-row">
            {d.quy_trinh_tong_the.map((s, i) => (
              <React.Fragment key={i}>
                <div className="flow-item">{s}</div>
                {i < d.quy_trinh_tong_the.length - 1 && <div className="flow-arrow">›</div>}
              </React.Fragment>
            ))}
          </div>
        </div>
      )}

      <PhanTichCard data={d} />
      <TokenBar usage={drawing.tokens_used || drawing.usage} />

      <div style={{height:8}}/>
    </>
  );
}

function App() {
  const [drawings, setDrawings] = useState([]);
  const [selected, setSelected] = useState(null);
  const [uploading, setUploading] = useState(false);
  const [drag, setDrag] = useState(false);
  const [chatMsgs, setChatMsgs] = useState([]);
  const [chatInput, setChatInput] = useState("");
  const [chatLoading, setChatLoading] = useState(false);
  const chatEndRef = useRef(null);
  const fileRef = useRef(null);

  useEffect(() => {
    fetch(`${API}/drawings?limit=50`)
      .then(r => r.json())
      .then(r => setDrawings(r.data || []))
      .catch(() => {});
  }, []);

  useEffect(() => {
    chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [chatMsgs]);

  const uploadFile = useCallback(async (file) => {
    if (!file || file.type !== "application/pdf") return;
    setUploading(true);
    const form = new FormData();
    form.append("file", file);
    try {
      const res = await fetch(`${API}/drawings`, { method: "POST", body: form });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Lỗi upload");
      const item = { id: data.id, ma_ban_ve: data.data?.ban_ve?.ma_ban_ve, ten_chi_tiet: data.data?.ban_ve?.ten_chi_tiet, status: "pending", full_data: data.data, tokens_used: data.tokens_used };
      setDrawings(prev => [item, ...prev]);
      setSelected(item);
      setChatMsgs([{ role: "ai", text: `Đã phân tích xong "${file.name}". Nếu có thông tin sai, gõ vào đây để tôi sửa lại.` }]);
    } catch (e) {
      alert("Lỗi: " + e.message);
    } finally {
      setUploading(false);
    }
  }, []);

  const handleDrop = useCallback((e) => {
    e.preventDefault(); setDrag(false);
    const file = e.dataTransfer.files[0];
    if (file) uploadFile(file);
  }, [uploadFile]);

  const selectDrawing = async (item) => {
    if (selected?.id === item.id) return;
    const res = await fetch(`${API}/drawings/${item.id}`);
    const data = await res.json();
    setSelected(data);
    setChatMsgs([{ role: "ai", text: `Bản vẽ "${data.ma_ban_ve || data.filename}". Gõ để sửa nếu AI đọc sai.` }]);
  };

  const sendCorrection = async () => {
    if (!chatInput.trim() || !selected || chatLoading) return;
    const msg = chatInput.trim();
    setChatInput("");
    setChatMsgs(prev => [...prev, { role: "user", text: msg }, { role: "ai", text: "Đang cập nhật...", thinking: true }]);
    setChatLoading(true);
    try {
      const res = await fetch(`${API}/drawings/${selected.id}/correct`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: msg }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Lỗi");
      const updated = { ...selected, full_data: data.data, tokens_used: data.tokens_used, status: "reviewed" };
      setSelected(updated);
      setDrawings(prev => prev.map(d => d.id === selected.id ? { ...d, status: "reviewed" } : d));
      setChatMsgs(prev => [...prev.slice(0, -1), { role: "ai", text: "Đã cập nhật kết quả theo yêu cầu của bạn." }]);
    } catch (e) {
      setChatMsgs(prev => [...prev.slice(0, -1), { role: "ai", text: "Lỗi: " + e.message }]);
    } finally {
      setChatLoading(false);
    }
  };

  const approve = async () => {
    if (!selected) return;
    await fetch(`${API}/drawings/${selected.id}/review`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ status: "approved" }),
    });
    setSelected(s => ({ ...s, status: "approved" }));
    setDrawings(prev => prev.map(d => d.id === selected.id ? { ...d, status: "approved" } : d));
  };

  return (
    <div className="layout">
      {/* LEFT */}
      <div className="left">
        <div className="left-header">
          <div className="logo">⬡ Mechanical AI</div>
          <div className="logo-sub">Đọc bản vẽ kỹ thuật</div>
        </div>

        <div
          className={`drop-zone${drag ? " drag" : ""}`}
          onDragOver={e => { e.preventDefault(); setDrag(true); }}
          onDragLeave={() => setDrag(false)}
          onDrop={handleDrop}
          onClick={() => fileRef.current?.click()}
        >
          <input ref={fileRef} type="file" accept=".pdf" onChange={e => uploadFile(e.target.files[0])} />
          <span className="drop-icon">📄</span>
          <div className="drop-text">
            <strong>Kéo thả PDF vào đây</strong>
            hoặc click để chọn file
          </div>
        </div>

        {uploading && (
          <div className="uploading">
            <span className="spin">⟳</span> Đang phân tích bản vẽ...
          </div>
        )}

        <div className="list-header">Bản vẽ ({drawings.length})</div>
        <div className="drawing-list">
          {drawings.map(d => (
            <div key={d.id} className={`drawing-item${selected?.id === d.id ? " active" : ""}`} onClick={() => selectDrawing(d)}>
              <div className="drawing-item-top">
                <div className="drawing-code">{d.ma_ban_ve || d.filename || `#${d.id}`}</div>
                <span className={`badge badge-${d.status || "pending"}`}>{d.status || "pending"}</span>
              </div>
              <div className="drawing-name">{d.ten_chi_tiet || "—"}</div>
            </div>
          ))}
          {drawings.length === 0 && !uploading && (
            <div style={{padding:"24px 12px",textAlign:"center",color:"var(--text3)",fontSize:12}}>
              Chưa có bản vẽ nào.<br/>Upload PDF để bắt đầu.
            </div>
          )}
        </div>
      </div>

      {/* RIGHT */}
      <div className="right">
        {!selected ? (
          <div className="empty">
            <div className="empty-icon">⬡</div>
            <p>Chọn bản vẽ hoặc upload PDF mới</p>
          </div>
        ) : (
          <>
            <div className="right-header">
              <div>
                <div className="drawing-title">{selected.ma_ban_ve || selected.filename}</div>
                <div className="drawing-title-sub">{selected.ten_chi_tiet || "—"} · {selected.vat_lieu || selected.full_data?.vat_lieu?.ma || "—"}</div>
              </div>
              {selected.status !== "approved" && (
                <button className="approve-btn" onClick={approve}>✓ Approve</button>
              )}
              {selected.status === "approved" && (
                <span className="badge badge-approved" style={{fontSize:12,padding:"6px 14px"}}>✓ Approved</span>
              )}
            </div>

            <div className="right-body">
              <ResultPanel drawing={selected} onApprove={approve} />
            </div>

            <div className="chat-panel">
              <div className="chat-hint">Gõ để sửa nếu AI đọc sai — ví dụ: "vật liệu là S45C không phải AL6061" hoặc "thiếu 2 lỗ M6 ở mặt bên"</div>
              {chatMsgs.length > 0 && (
                <div className="chat-messages">
                  {chatMsgs.map((m, i) => (
                    <div key={i} className={`chat-msg ${m.role}${m.thinking ? " thinking" : ""}`}>
                      <div className="chat-bubble">{m.text}</div>
                    </div>
                  ))}
                  <div ref={chatEndRef}/>
                </div>
              )}
              <div className="chat-input-row">
                <input
                  className="chat-input"
                  value={chatInput}
                  onChange={e => setChatInput(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && sendCorrection()}
                  placeholder="Nhập yêu cầu sửa..."
                  disabled={chatLoading}
                />
                <button className="chat-send" onClick={sendCorrection} disabled={chatLoading || !chatInput.trim()}>
                  {chatLoading ? "..." : "Gửi"}
                </button>
              </div>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
