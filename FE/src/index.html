<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>MekongAI</title>
    <base href="/accountant/" />
    <!-- viewport-fit=cover enables safe-area insets on iOS; harmless on Android -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <!-- Fonts - Load async, không block rendering -->
    <script>
      // Load fonts async để không block khởi động
      (function () {
        // Load fonts cho cả Electron và Web
        const link1 = document.createElement("link");
        link1.rel = "preconnect";
        link1.href = "https://fonts.googleapis.com";
        document.head.appendChild(link1);

        const link2 = document.createElement("link");
        link2.rel = "preconnect";
        link2.href = "https://fonts.gstatic.com";
        link2.crossOrigin = "anonymous";
        document.head.appendChild(link2);

        // Load Inter font
        const link3 = document.createElement("link");
        link3.href =
          "https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap";
        link3.rel = "stylesheet";
        link3.media = "print";
        link3.onload = function () {
          this.media = "all";
        };
        document.head.appendChild(link3);

        // Load Material Symbols - QUAN TRỌNG: Phải load cho cả Electron
        const link4 = document.createElement("link");
        link4.href =
          "https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap";
        link4.rel = "stylesheet";
        link4.media = "print";
        link4.onload = function () {
          this.media = "all";
        };
        document.head.appendChild(link4);
      })();
    </script>
    <link rel="shortcut icon" type="icon" href="favicon.ico" />
  </head>
  <body>
