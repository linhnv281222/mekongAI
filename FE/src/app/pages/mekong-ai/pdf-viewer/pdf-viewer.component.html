<div class="pdf-wrapper">
  <!-- Toolbar -->
  <div class="pdf-toolbar">
    <div class="pdf-toolbar-left">
      <span class="pdf-filename" [title]="fileName">{{ fileName }}</span>
    </div>

    <div class="pdf-toolbar-center" *ngIf="totalPages > 0">
      <button class="pdf-nav-btn" (click)="goToPrevPage()" [disabled]="currentPage <= 1" title="Trang trước">
        ‹
      </button>
      <span class="pdf-page-info">
        <span class="pdf-page-current">{{ currentPage }}</span>
        <span class="pdf-page-sep">/</span>
        <span>{{ totalPages }}</span>
      </span>
      <button class="pdf-nav-btn" (click)="goToNextPage()" [disabled]="currentPage >= totalPages" title="Trang kế">
        ›
      </button>
    </div>

    <div class="pdf-toolbar-right" *ngIf="totalPages > 0">
      <button class="pdf-nav-btn pdf-zoom-btn" (click)="zoomOut()" [disabled]="scale <= 0.5" title="Thu nhỏ">
        −
      </button>
      <span class="pdf-zoom-label">{{ scale * 100 | number:'1.0-0' }}%</span>
      <button class="pdf-nav-btn pdf-zoom-btn" (click)="zoomIn()" [disabled]="scale >= 4" title="Phóng to">
        +
      </button>
    </div>
  </div>

  <!-- Viewer -->
  <div class="pdf-scroll-area" #canvasContainer>
    <div *ngIf="isLoading" class="pdf-loading-overlay">
      <i class="pi pi-spin pi-spinner"></i>
      <span>Đang tải…</span>
    </div>
    <div *ngIf="loadError" class="pdf-loading-overlay" style="color: #f87171;">
      <i class="pi pi-exclamation-triangle"></i>
      <span>{{ loadError }}</span>
    </div>
  </div>
</div>
