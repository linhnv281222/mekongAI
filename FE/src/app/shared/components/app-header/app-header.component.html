<header class="app-header">
  <div class="app-brand-mark" aria-hidden="true">M</div>
  <div class="app-brand-text">
    <div class="app-brand-title">Mekong AI</div>
    <div class="app-brand-sub">Soạn thảo báo giá từ email tự động</div>
  </div>
  <div class="app-header-spacer"></div>
  <div class="app-live">
    <span
      class="app-live-dot"
      [class.app-live-dot--err]="apiStatus === 'offline'"
      aria-hidden="true"
    ></span>
    <span>{{ apiStatus === "online" ? "Đang kết nối" : "Không kết nối" }}</span>
  </div>
  <nav class="app-nav" aria-label="Điều hướng">
    <button
      type="button"
      class="nav-link"
      [class.nav-link--active]="isActive('/mekong-ai/rfq')"
      title="Phiếu báo giá RFQ"
      (click)="navigate('./mekong-ai/rfq')"
    >
      <i class="pi pi-inbox"></i>
      Phiếu báo giá
    </button>
    <button
      type="button"
      class="nav-link"
      [class.nav-link--active]="isActive('/mekong-ai/admin/prompts')"
      title="Cấu hình prompt & kiến thức AI"
      (click)="navigate('./mekong-ai/admin/prompts')"
    >
      <i class="pi pi-sliders-h"></i>
      Cấu hình AI
    </button>
  </nav>
</header>
