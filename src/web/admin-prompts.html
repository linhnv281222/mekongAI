<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cấu hình prompt — Mekong AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/admin-prompts.css" />
  </head>
  <body>
    <!-- Header đồng bộ với demoV3 (app-header / app-nav) -->
    <header class="app-header">
      <div class="app-brand-mark" aria-hidden="true">M</div>
      <div class="app-brand-text">
        <div class="app-brand-title">Mekong AI</div>
        <div class="app-brand-sub">
          Soạn thảo báo giá từ email tự động
        </div>
      </div>
      <div class="app-header-spacer"></div>
      <div class="app-live" id="apiStatus">
        <span class="app-live-dot" id="statusDot" aria-hidden="true"></span>
        <span id="statusText">Đang kiểm tra…</span>
      </div>
      <nav class="app-nav" aria-label="Điều hướng">
        <a
          href="/src/web/demoV3.html"
          class="nav-link"
          title="Phiếu báo giá RFQ"
        >
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"
            />
            <rect x="9" y="3" width="6" height="4" rx="1" />
            <path d="M9 12h6M9 16h4" />
          </svg>
          Phiếu báo giá
        </a>
        <a
          href="/src/web/admin-prompts.html"
          class="nav-link nav-link--active"
          title="Cấu hình prompt & kiến thức AI"
        >
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M12 2L2 7l10 5 10-5-10-5z" />
            <path d="M2 17l10 5 10-5" />
            <path d="M2 12l10 5 10-5" />
          </svg>
          Cấu hình AI
        </a>
      </nav>
    </header>

    <!-- ── Main ── -->
    <div class="layout">
      <!-- Sidebar -->
      <div class="sidebar">
        <div class="sidebar-section">
          <div class="sidebar-section-title">Prompt</div>
          <div id="promptNav"></div>
        </div>
        <div class="sidebar-section">
          <div class="sidebar-section-title">Kiến thức</div>
          <div id="knowledgeNav"></div>
        </div>
        <div class="sidebar-section">
          <div class="sidebar-section-title">Hệ thống</div>
          <div class="nav-item" onclick="showOverview()">
            <div class="nav-icon">&#9776;</div>
            <span class="nav-label">Tổng quan</span>
          </div>
        </div>
      </div>

      <!-- Content -->
      <div class="content" id="contentArea">
        <div class="empty-state">Đang tải…</div>
      </div>
    </div>

    <!-- Toast container -->
    <div id="toastContainer"></div>

    <script src="js/admin-prompts.js"></script>
  </body>
</html>
